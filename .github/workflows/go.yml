name: Go
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Go environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.20'
    - name: Install dependencies
      run: go mod tidy
    - name: Lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: '1.52.2'
    - name: Test
      run: go test -race -v ./...
    - name: Build
      run: go build -v ./...
